name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Show environment details
        run: |
          python --version
          pip --version
          pip list
      - name: Verify test collection
        id: collect
        continue-on-error: true
        run: python -m pytest --collect-only -q
      - name: Show collection diagnostics
        if: steps.collect.outcome == 'failure'
        run: |
          python -m pytest --collect-only -vv --full-trace
          python -m pip check
          pip list
          exit 1
      - name: Run pytest
        if: steps.collect.outcome == 'success'
        run: python -m pytest -q -ra
      - name: Dump diagnostics on failure
        if: failure()
        run: |
          python -m pip check
          pip list
